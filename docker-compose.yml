services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./api-server
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: always
    env_file: ./api-server/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/docs').status < 500 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    # Uncomment for local dev
    # ports:
    #   - "8000:8000"

  worker:
    build: ./api-server
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    restart: always
    env_file: ./api-server/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: bun run start
    restart: always
    env_file: ./frontend/.env
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    # Uncomment for local
    # ports:
    #   - "3000:3000"

  #comment out for local development
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  redis_data:
