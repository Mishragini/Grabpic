services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build: ./api-server
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: always
    env_file: ./api-server/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    expose:
      - "8000"

  worker:
    build: ./api-server
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    restart: always
    env_file: ./api-server/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
      - backend

  frontend:
    build: ./frontend
    restart: always
    env_file: ./frontend/.env
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

volumes:
  redis_data:
