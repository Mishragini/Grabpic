events{}

http {
    upstream backend {
        server backend:8000;
    }
    upstream frontend {
        server frontend:3000;
    }

    # Redirect all HTTP → HTTPS
    server {
        listen 80;
        server_name grab-pic.app www.grab-pic.app;

        # Let certbot's auto-renewal verify domain ownership over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS

    server{
        listen 443 ssl;
        server_name grab-pic.app www.grab-pic.app;

        ssl_certificate     /etc/letsencrypt/live/grab-pic.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grab-pic.app/privkey.pem;

        # ── API routes ─────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        # ── WebSocket ──────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Frontend SSR ───────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

    }
}