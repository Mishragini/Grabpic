events {}

http {
    resolver 127.0.0.11 valid=30s;

    # Cloudflare real IP passthrough 
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;

    # Catch-all: silently drop unknown hosts
    server {
        listen 80  default_server;
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate     /etc/letsencrypt/live/grab-pic.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grab-pic.app/privkey.pem;
        return 444;
    }

    # HTTP → HTTPS 
    server {
        listen 80;
        server_name grab-pic.app www.grab-pic.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://grab-pic.app$request_uri;
        }
    }

    # www → apex redirect
    server {
        listen 443 ssl;
        server_name www.grab-pic.app;
        ssl_certificate     /etc/letsencrypt/live/grab-pic.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grab-pic.app/privkey.pem;
        return 301 https://grab-pic.app$request_uri;
    }

    # ── Main HTTPS ────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name grab-pic.app;
        ssl_certificate     /etc/letsencrypt/live/grab-pic.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grab-pic.app/privkey.pem;

        # Block double-slash URIs
        if ($request_uri ~ "^//") {
            return 400;
        }

        # Security headers
        add_header X-Content-Type-Options  "nosniff"                        always;
        add_header X-Frame-Options         "SAMEORIGIN"                     always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "geolocation=(), microphone=()"  always;

        # Block sensitive file probes before they reach your app
        location ~* (\.env|\.git|wp-config\.php|\.htaccess|\.npmrc|\.pgpass|\.netrc|phpinfo\.php|\.aws) {
            return 404;
        }

        # API
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        # WebSocket
        location /ws/ {
            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
        }

        # Frontend
        location / {
            limit_req zone=general burst=50 nodelay;

            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}