events{}
http {
    resolver 127.0.0.11 valid=30s;

    upstream frontend {
        server frontend:3000;   # matches your EXPOSE 3000
    }

    upstream backend {
        server backend:8000;    # matches your EXPOSE 8000
    }

    # Redirect all HTTP → HTTPS
    server {
        listen 80;
        server_name grab-pic.app www.grab-pic.app;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name grab-pic.app www.grab-pic.app;
        ssl_certificate     /etc/letsencrypt/live/grab-pic.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grab-pic.app/privkey.pem;

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}